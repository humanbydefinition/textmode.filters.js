name: Existing Feature Enhancement
description: Suggest an improvement to an existing textmode.filters.js feature.
labels: [Enhancement]
body:
    - type: textarea
      id: access
      attributes:
          label: Access and usability impact
          description: How would this improve the library for artists, designers, learners, or contributors? If unsure, say so.
      validations:
          required: true
    - type: checkboxes
      id: area
      attributes:
          label: Most relevant area
          description: You may select more than one.
          options:
              - label: Plugin installation / lifecycle
              - label: Filter registration / uninstall
              - label: Shader behavior / rendering output
              - label: Filter parameters / defaults
              - label: Animated filters / time-based effects
              - label: Grid distortion / geometry mapping
              - label: WebGL2 / GPU / browser compatibility
              - label: textmode.js integration
              - label: Build / types / packaging
              - label: Documentation / examples
              - label: Other
    - type: textarea
      id: current
      attributes:
          label: Current behavior
          description: Describe the existing filter, API, docs, or workflow and what is limiting about it today.
      validations:
          required: true
    - type: textarea
      id: proposal
      attributes:
          label: Proposed enhancement
      validations:
          required: true
    - type: textarea
      id: alternatives
      attributes:
          label: Alternatives considered
          description: Workarounds, competing API shapes, shader-level alternatives, or reasons to avoid the change.
      validations:
          required: false
