name: New Feature Request
description: Request a new capability to be added to textmode.filters.js.
labels: [Feature Request]
body:
  - type: textarea
    id: access
    attributes:
      label: Access and usability impact
      description: How would this improve filter workflows or make the add-on easier to use, learn, or extend?
    validations:
      required: true
  - type: checkboxes
    id: area
    attributes:
      label: Most relevant area
      description: You may select more than one.
      options:
        - label: Plugin installation / lifecycle
        - label: New built-in filter
        - label: Filter authoring / extensibility
        - label: Shader behavior / rendering output
        - label: Filter parameters / defaults
        - label: Animated filters / time-based effects
        - label: Grid distortion / geometry mapping
        - label: WebGL2 / GPU / browser compatibility
        - label: textmode.js integration
        - label: Build / types / packaging
        - label: Documentation / examples
        - label: Other
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What are you unable to do today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed feature
    validations:
      required: true
  - type: textarea
    id: examples
    attributes:
      label: Examples or prior art
      description: Similar APIs in shader tooling, image-processing libraries, creative-coding frameworks, or your own sketches and renders.
    validations:
      required: false
