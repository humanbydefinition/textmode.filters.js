<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>textmode.filters.js - sketch</title>
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<link rel="stylesheet" href="./style.css" />
	</head>
	<body>
		<script type="module">
			import * as textmodeModule from 'textmode.js';
			import * as filtersModule from 'textmode.filters.js';

			const params = new URLSearchParams(window.location.search);
			const examplePath = params.get('path');
			const isEmbeddedPreview = window.self !== window.top;

			const EXAMPLES = {
				brightness: {
					title: 'brightness',
					description: 'Adjust image brightness using a single scalar amount.',
					controls: `
						<div class="controls">
							<label for="brightness">Brightness</label>
							<input type="range" id="brightness" min="0" max="3" step="0.1" value="1.0" />
							<span id="brightness-value">1.0</span>
						</div>
					`,
				},
				contrast: {
					title: 'contrast',
					description: 'Push darks and lights apart or flatten them toward gray.',
					controls: `
						<div class="controls">
							<label for="contrast">Contrast</label>
							<input type="range" id="contrast" min="0" max="3" step="0.1" value="1.0" />
							<span id="contrast-value">1.0</span>
						</div>
					`,
				},
				saturation: {
					title: 'saturation',
					description: 'Shift from grayscale to vivid oversaturated color.',
					controls: `
						<div class="controls">
							<label for="saturation">Saturation</label>
							<input type="range" id="saturation" min="0" max="2" step="0.1" value="1.0" />
							<span id="saturation-value">1.0</span>
						</div>
					`,
				},
				hueRotate: {
					title: 'hueRotate',
					description: 'Rotate colors around the hue wheel.',
					controls: `
						<div class="controls">
							<label for="hue">Hue Angle</label>
							<input type="range" id="hue" min="0" max="360" step="1" value="0" />
							<span id="hue-value">0°</span>
						</div>
					`,
				},
				posterize: {
					title: 'posterize',
					description: 'Reduce the color palette to stepped bands.',
					controls: `
						<div class="controls">
							<label for="levels">Color Levels</label>
							<input type="range" id="levels" min="2" max="32" step="1" value="4" />
							<span id="levels-value">4</span>
						</div>
					`,
				},
				chromaticAberration: {
					title: 'chromaticAberration',
					description: 'Separate color channels to simulate lens distortion.',
					controls: `
						<div class="controls">
							<label for="amount">Amount</label>
							<input type="range" id="amount" min="0" max="50" step="1" value="5" />
							<span id="amount-value">5</span>
						</div>
					`,
				},
				pixelate: {
					title: 'pixelate',
					description: 'Block sample the image into larger pixel cells.',
					controls: `
						<div class="controls">
							<label for="pixelSize">Pixel Size</label>
							<input type="range" id="pixelSize" min="1" max="32" step="1" value="4" />
							<span id="pixelSize-value">4</span>
						</div>
					`,
				},
				gridDistortion: {
					title: 'gridDistortion',
					description: 'Warp the textmode grid with animated per-column and per-row factors.',
					controls: `
						<div class="controls controls--button">
							<button id="toggleAnimation">Pause Animation</button>
						</div>
						<div class="controls">
							<label for="widthVariation">Width Var</label>
							<input type="range" id="widthVariation" min="0" max="1" step="0.1" value="0.5" />
							<span id="widthVariation-value">0.5</span>
						</div>
						<div class="controls">
							<label for="heightVariation">Height Var</label>
							<input type="range" id="heightVariation" min="0" max="1" step="0.1" value="0.5" />
							<span id="heightVariation-value">0.5</span>
						</div>
					`,
				},
				glitch: {
					title: 'glitch',
					description: 'Introduce unstable digital breakup and signal artifacts.',
					controls: `
						<div class="controls">
							<label for="glitch">Glitch Amt</label>
							<input type="range" id="glitch" min="0" max="5" step="0.1" value="0" />
							<span id="glitch-value">0.0</span>
						</div>
					`,
				},
				crtMattias: {
					title: 'crtMattias',
					description: 'Apply CRT curvature and animated scan movement.',
					controls: `
						<div class="controls">
							<label for="curvature">Curvature</label>
							<input type="range" id="curvature" min="0" max="1" step="0.05" value="0.5" />
							<span id="curvature-value">0.5</span>
						</div>
						<div class="controls">
							<label for="scanSpeed">Scan Speed</label>
							<input type="range" id="scanSpeed" min="0" max="10" step="0.5" value="1" />
							<span id="scanSpeed-value">1.0</span>
						</div>
					`,
				},
				scanlines: {
					title: 'scanlines',
					description: 'Overlay adjustable horizontal scanlines with animated drift.',
					controls: `
						<div class="controls">
							<label for="count">Line Count</label>
							<input type="range" id="count" min="10" max="800" step="1" value="300" />
							<span id="count-value">300</span>
						</div>
						<div class="controls">
							<label for="intensity">Intensity</label>
							<input type="range" id="intensity" min="0" max="1" step="0.05" value="0.5" />
							<span id="intensity-value">0.5</span>
						</div>
						<div class="controls">
							<label for="speed">Scan Speed</label>
							<input type="range" id="speed" min="0" max="10" step="0.1" value="1.0" />
							<span id="speed-value">1.0</span>
						</div>
					`,
				},
				vignette: {
					title: 'vignette',
					description: 'Darken and soften the frame edges with rounded falloff.',
					controls: `
						<div class="controls">
							<label for="amount">Amount</label>
							<input type="range" id="amount" min="0" max="1" step="0.05" value="0.5" />
							<span id="amount-value">0.5</span>
						</div>
						<div class="controls">
							<label for="softness">Softness</label>
							<input type="range" id="softness" min="0" max="1" step="0.05" value="0.5" />
							<span id="softness-value">0.5</span>
						</div>
						<div class="controls">
							<label for="roundness">Roundness</label>
							<input type="range" id="roundness" min="0" max="1" step="0.05" value="0.5" />
							<span id="roundness-value">0.5</span>
						</div>
					`,
				},
				bloom: {
					title: 'bloom',
					description: 'Glow bright regions with threshold, intensity, and radius controls.',
					controls: `
						<div class="controls">
							<label for="threshold">Threshold</label>
							<input type="range" id="threshold" min="0" max="1" step="0.05" value="0.5" />
							<span id="threshold-value">0.5</span>
						</div>
						<div class="controls">
							<label for="intensity">Intensity</label>
							<input type="range" id="intensity" min="0" max="3" step="0.1" value="1.0" />
							<span id="intensity-value">1.0</span>
						</div>
						<div class="controls">
							<label for="radius">Radius</label>
							<input type="range" id="radius" min="1" max="20" step="0.5" value="4.0" />
							<span id="radius-value">4.0</span>
						</div>
					`,
				},
				filmGrain: {
					title: 'filmGrain',
					description: 'Overlay animated grain with control over intensity, size, and speed.',
					controls: `
						<div class="controls">
							<label for="intensity">Intensity</label>
							<input type="range" id="intensity" min="0" max="1" step="0.05" value="0.2" />
							<span id="intensity-value">0.2</span>
						</div>
						<div class="controls">
							<label for="size">Size</label>
							<input type="range" id="size" min="1" max="10" step="0.5" value="2.0" />
							<span id="size-value">2.0</span>
						</div>
						<div class="controls">
							<label for="speed">Speed</label>
							<input type="range" id="speed" min="0" max="5" step="0.1" value="1.0" />
							<span id="speed-value">1.0</span>
						</div>
					`,
				},
			};

			function showError(message) {
				document.body.innerHTML = `
					<div class="sketch-error">
						<div class="sketch-error-card">
							<p>${message}</p>
						</div>
					</div>
				`;
			}

			if (!examplePath || !(examplePath in EXAMPLES)) {
				showError('Invalid example path.');
			} else {
				const example = EXAMPLES[examplePath];
				document.title = `textmode.filters.js - ${example.title}`;

				document.body.innerHTML = `
					${
						isEmbeddedPreview
							? ''
							: `
					<div class="nav-overlay">
						<a href="./index.html" class="back-link">back to examples</a>
					</div>
					`
					}
							<section class="canvas-panel">
								<div class="canvas-panel-header">
									<h1 class="canvas-panel-title">${example.title}</h1>
									<p class="canvas-panel-subtitle">${example.description}</p>
								</div>
								<div class="canvas-frame">
									<canvas id="textmode-canvas" width="800" height="600"></canvas>
								</div>
							</section>
							<aside class="controls-panel">
								<div class="controls-panel-header">
									<h2 class="controls-panel-title">Controls</h2>
									<p class="controls-panel-subtitle">Live parameters for this filter example.</p>
								</div>
								<div class="controls-stack">
									${example.controls}
								</div>
							</aside>
				`;

				window.textmode = textmodeModule.textmode;
				window.FiltersPlugin = filtersModule.FiltersPlugin;

				const script = document.createElement('script');
				script.src = `./${examplePath}/sketch.js`;
				script.onerror = () => showError(`Unable to load ${examplePath}.`);
				document.body.appendChild(script);
			}
		</script>
	</body>
</html>
